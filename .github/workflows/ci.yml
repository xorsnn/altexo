name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install (offline-safe, no scripts)
        run: npm ci --ignore-scripts
      - name: Syntax check (node --check)
        run: |
          find packages -name '*.js' -not -path '*/node_modules/*' -print0 \
            | xargs -0 -I{} node --check {}
      - name: Unit tests (no network)
        run: npm test
